<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的主页</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: rgba(255, 255, 255, 0.08);
        --card-border: rgba(255, 255, 255, 0.14);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-2: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.28), transparent 35%),
          radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.18), transparent 30%),
          linear-gradient(135deg, #020617 0%, #0f172a 55%, #111827 100%);
      }

      .page {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .hero {
        width: min(920px, 100%);
        padding: 48px 36px;
        border: 1px solid var(--card-border);
        border-radius: 28px;
        background: var(--card);
        backdrop-filter: blur(18px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        position: relative;
        overflow: hidden;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.18), transparent 35%, rgba(34, 197, 94, 0.12));
        pointer-events: none;
        mask: linear-gradient(#000, transparent 85%);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        color: #cbd5e1;
        background: rgba(255, 255, 255, 0.05);
        font-size: 14px;
        letter-spacing: 0.02em;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 0 18px rgba(56, 189, 248, 0.75);
      }

      h1 {
        margin: 20px 0 14px;
        font-size: clamp(40px, 7vw, 76px);
        line-height: 0.98;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        max-width: 640px;
        color: var(--muted);
        font-size: clamp(16px, 2vw, 20px);
        line-height: 1.8;
      }

      .actions {
        margin-top: 30px;
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 140px;
        padding: 14px 18px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn-primary {
        color: #06131f;
        background: linear-gradient(135deg, #7dd3fc, #34d399);
      }

      .btn-secondary {
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.04);
      }

      .footer {
        margin-top: 34px;
        color: rgba(226, 232, 240, 0.55);
        font-size: 14px;
      }

      @media (max-width: 640px) {
        .hero {
          padding: 34px 22px;
          border-radius: 22px;
        }

        .actions {
          flex-direction: column;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="badge"><span class="dot"></span> Welcome</div>
        <h1>欢迎来到我的主页</h1>
        <p>
          这里是我的个人空间，我会在这里分享我的想法、作品和一些有趣的内容。
          期待与你在这里相遇，也欢迎常来看看。
        </p>
        <div class="actions">
          <a class="btn btn-primary" href="#about">了解更多</a>
          <a class="btn btn-secondary" href="#contact">联系我</a>
        </div>
        <div class="footer">© 2026 我的主页</div>
      </section>
    </main>
  </body>
</html>
